<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harlon – Loader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --maroon: #6b1a2a;
            --maroon-light: #8b2a3e;
            --maroon-dark: #4a0f1c;
            --cream: #faf6f1;
            --gold: #c9a86c;
        }

        body {
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
        }

        /* Subtle grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.5;
        }

        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        /* ── Logo SVG ── */
        .logo-svg {
            width: 320px;
            overflow: visible;
            filter: drop-shadow(0 4px 18px rgba(107, 26, 42, 0.18));
        }

        /* Draw-on stroke animation */
        .logo-path {
            fill: none;
            stroke: var(--maroon);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: draw 1.8s cubic-bezier(.4, 0, .2, 1) 0.2s forwards;
        }

        /* Fill fades in after draw */
        .logo-fill {
            fill: var(--maroon);
            opacity: 0;
            animation: fillIn 0.6s ease 1.9s forwards;
        }

        /* Swoosh underline */
        .swoosh {
            fill: none;
            stroke: var(--maroon);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 400;
            stroke-dashoffset: 400;
            animation: draw 0.8s ease 1.6s forwards;
        }

        .swoosh-fill {
            fill: var(--maroon);
            opacity: 0;
            animation: fillIn 0.5s ease 1.9s forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fillIn {
            to {
                opacity: 1;
            }
        }

        /* ── Progress bar ── */
        .bar-wrap {
            position: relative;
            width: 260px;
        }

        .bar-track {
            width: 100%;
            height: 3px;
            background: rgba(107, 26, 42, 0.12);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--maroon-dark), var(--maroon-light), var(--gold));
            border-radius: 2px;
            animation: progress 2.6s cubic-bezier(.4, 0, .2, 1) 0.3s forwards;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }

            40% {
                width: 45%;
            }

            70% {
                width: 72%;
            }

            100% {
                width: 100%;
            }
        }

        /* Percentage label */
        .pct {
            position: absolute;
            right: 0;
            top: -22px;
            font-size: 12px;
            letter-spacing: 0.08em;
            color: var(--maroon);
            opacity: 0.7;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        /* Dots */
        .dots {
            display: flex;
            gap: 8px;
            margin-top: -10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--maroon);
            opacity: 0.2;
        }

        .dot:nth-child(1) {
            animation: pulse 1.2s ease-in-out 0.0s infinite;
        }

        .dot:nth-child(2) {
            animation: pulse 1.2s ease-in-out 0.2s infinite;
        }

        .dot:nth-child(3) {
            animation: pulse 1.2s ease-in-out 0.4s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        /* Tag line */
        .tagline {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--maroon);
            opacity: 0;
            animation: fadeUp 0.7s ease 2.2s forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 0.6;
                transform: translateY(0);
            }
        }

        /* Fade out entire loader */
        .loader-wrap {
            animation: fadeOut 0.5s ease 3.4s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                pointer-events: none;
            }
        }

        /* Jersey stitch border decoration */
        .stitch-ring {
            position: fixed;
            inset: 18px;
            border: 2px dashed rgba(107, 26, 42, 0.08);
            border-radius: 4px;
            pointer-events: none;
        }
    </style>
</head>

        <span class="tagline">Premium Jerseys — Est. Since Day One</span>

    <script>
        // Animate the percentage counter to match the CSS progress bar
        const pct = document.getElementById('pct');
        const keyframes = [
            { t: 300, v: 0 },
            { t: 1350, v: 45 },
            { t: 2150, v: 72 },
            { t: 2900, v: 100 },
        ];
        let start = null;
        function lerp(a, b, t) { return a + (b - a) * t; }
        function getTarget(elapsed) {
            for (let i = 1; i < keyframes.length; i++) {
                if (elapsed <= keyframes[i].t) {
                    const prev = keyframes[i - 1];
                    const curr = keyframes[i];
                    const t = (elapsed - prev.t) / (curr.t - prev.t);
                    return Math.round(lerp(prev.v, curr.v, Math.min(t, 1)));
                }
            }
            return 100;
        }
        function tick(ts) {
            if (!start) start = ts;
            const elapsed = ts - start;
            pct.textContent = getTarget(elapsed) + '%';
            if (elapsed < 2900) requestAnimationFrame(tick);
            else pct.textContent = '100%';
        }
        setTimeout(() => requestAnimationFrame(tick), 300);
    </script>
